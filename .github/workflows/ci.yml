name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: marketlum
          POSTGRES_PASSWORD: marketlum
          POSTGRES_DB: marketlum_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U marketlum -d marketlum_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.9.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enable uuid-ossp extension
        run: psql -h localhost -U marketlum -d marketlum_test -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
        env:
          PGPASSWORD: marketlum

      - name: Create .env.test
        run: |
          printf '%s\n' \
            'DATABASE_HOST=localhost' \
            'DATABASE_PORT=5432' \
            'DATABASE_USERNAME=marketlum' \
            'DATABASE_PASSWORD=marketlum' \
            'DATABASE_NAME=marketlum_test' \
            'JWT_SECRET=test-secret-not-for-production' \
            'JWT_EXPIRES_IN=1d' \
            'API_PORT=3001' \
            'WEB_PORT=3000' \
            > .env.test

      - name: Build shared package
        run: pnpm --filter @marketlum/shared build

      - name: Lint
        run: |
          pnpm --filter @marketlum/shared run lint
          pnpm --filter @marketlum/api run lint

      - name: Build web
        run: pnpm --filter @marketlum/web build

      - name: Run E2E tests
        run: pnpm test:e2e
